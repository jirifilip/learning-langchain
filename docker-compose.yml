services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    ports:
      - "5000:5000"
    profiles:
      - tracing
    volumes:
      - ./mlflow.db:/mlflow/mlflow.db
      - ./mlartifacts:/mlflow/mlartifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --artifacts-destination /mlflow/mlartifacts
